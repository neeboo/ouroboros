[linear]
# Prefer an environment variable for shared or open-source setups.
token_env = "LINEAR_API_KEY"

# For local-only development you may also use a token file. Keep that file ignored.
# token_file = ".linear"

api_url = "https://api.linear.app/graphql"
project_url = "https://linear.app/<workspace>/project/<project-slug>/overview"
project_id = "<project-slug-or-id>"
team_key = "<team-key>"

# Optional: keep Codex verifier model defaults separate from agent backend selection.
[models.roles.verifier]
model = "gpt-5.5"
reason = "keep verifier on a stronger verifier model"

[agentDefaults]
global = "claude-code"

[agentDefaults.roles]
verifier = "codex-resumable"

["agentBackends"."claude-code"]
kind = "acpx"
agent = "claude"
approval = "approve-all"

["agentBackends"."codex-resumable"]
kind = "codex-resumable"
